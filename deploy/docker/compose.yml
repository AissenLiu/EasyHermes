services:
  eazyhermes:
    image: eazyhermes:local
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.eazyhermes
    container_name: eazyhermes
    ports:
      - "127.0.0.1:${EAZYHERMES_WEBUI_PORT:-8787}:8787"
    environment:
      HERMES_HOME: /opt/data/.hermes
      HERMES_BASE_HOME: /opt/data/.hermes
      HERMES_WEBUI_AGENT_DIR: /opt/hermes-agent
      HERMES_WEBUI_STATE_DIR: /opt/data/webui
      HERMES_WEBUI_DEFAULT_WORKSPACE: /workspace
      HERMES_WEBUI_HOST: 0.0.0.0
      HERMES_WEBUI_PORT: 8787
      HERMES_WEBUI_AUTO_INSTALL: "0"
      HERMES_WEBUI_PASSWORD: ${HERMES_WEBUI_PASSWORD:-}
      EAZYHERMES_START_GATEWAY: ${EAZYHERMES_START_GATEWAY:-0}
    volumes:
      - ../../data:/opt/data
      - ../../workspace:/workspace
    restart: unless-stopped

